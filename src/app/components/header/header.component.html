<header class="header">
  <div class="container">
    <div class="header-content">
      <div class="header-data">
        <div class="logo">
          <a href="#">JK</a>
        </div>

        <nav class="nav" [class.active]="isMobileMenuOpen">
          <ul class="nav-list">
            <li><a (click)="navigateToSection('home')">Home</a></li>
            <li><a (click)="navigateToSection('about')">About</a></li>
            <li><a (click)="navigateToSection('experience')">Work</a></li>
            <li><a (click)="navigateToSection('projects')">Projects</a></li>
            <li><a (click)="navigateToSection('contact')">Contact</a></li>
          </ul>

          <!-- Add mobile theme toggle inside the nav menu -->
          <div class="mobile-theme-toggle">
            <button (click)="toggleTheme()" class="theme-toggle-btn">
              @if (isDarkTheme) {<span class="toggle-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="5"></circle>
                  <line x1="12" y1="1" x2="12" y2="3"></line>
                  <line x1="12" y1="21" x2="12" y2="23"></line>
                  <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                  <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                  <line x1="1" y1="12" x2="3" y2="12"></line>
                  <line x1="21" y1="12" x2="23" y2="12"></line>
                  <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                  <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
              </span>}
              @if (!isDarkTheme) {<span class="toggle-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
              </span>}
              <!-- <span class="theme-toggle-label">Toggle Theme</span> -->
            </button>
          </div>
        </nav>
      </div>

      <!-- Desktop theme toggle - positioned at the end -->
      <div class="desktop-theme-toggle">
        <button (click)="toggleTheme()" class="theme-toggle-btn">
          @if (isDarkTheme) {<span class="toggle-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </span>}
          @if (!isDarkTheme) {<span class="toggle-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </span>}
        </button>
      </div>

      <div class="mobile-side-menu-header">


        <button class="mobile-menu-btn" (click)="toggleMobileMenu()">
          @if (!isMobileMenuOpen) {☰}
          @if (isMobileMenuOpen) {✕}
        </button>
      </div>
    </div>
  </div>

  <div class="overlay" [class.active]="isMobileMenuOpen" (click)="closeMobileMenu()"></div>
</header>
